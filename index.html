<!DOCTYPE html>
<html lang="en">
<!--
╔══════════════════════════════════════════════════════════════════════╗
║          GOLF SCRAMBLE SCORECARD — FIREBASE SETUP GUIDE              ║
╠══════════════════════════════════════════════════════════════════════╣
║                                                                      ║
║  STEP 1 — Create a Firebase Project (free)                           ║
║    • Go to https://console.firebase.google.com                       ║
║    • Click "Add project", name it (e.g. "GolfScramble"), hit Next   ║
║    • Disable Google Analytics (optional), click "Create project"     ║
║                                                                      ║
║  STEP 2 — Create a Realtime Database                                 ║
║    • In the left sidebar: Build → Realtime Database                  ║
║    • Click "Create Database"                                         ║
║    • Choose any location, click Next                                 ║
║    • Select "Start in test mode" (allows all reads/writes)           ║
║    • Click Enable                                                    ║
║                                                                      ║
║  STEP 3 — Get your config keys                                       ║
║    • Click the gear icon ⚙ → "Project settings"                     ║
║    • Scroll to "Your apps" → click the "</>" Web icon                ║
║    • Register your app (any nickname), skip Firebase Hosting         ║
║    • Copy the firebaseConfig object that appears                     ║
║                                                                      ║
║  STEP 4 — Paste your config                                          ║
║    • Find "PASTE YOUR FIREBASE CONFIG HERE" below in this file       ║
║    • Replace all the placeholder values with your real keys          ║
║    • The databaseURL is critical — it looks like:                    ║
║      https://YOUR-PROJECT-default-rtdb.firebaseio.com                ║
║                                                                      ║
║  STEP 5 — Share the file                                             ║
║    • Host it anywhere: Netlify Drop (drag & drop at netlify.drop),   ║
║      GitHub Pages, or serve locally with any static server           ║
║    • All players open the same URL — scores sync instantly           ║
║                                                                      ║
║  SECURITY NOTE: Test mode expires after 30 days. To extend, go to   ║
║  Realtime Database → Rules and set read/write to true permanently.   ║
╚══════════════════════════════════════════════════════════════════════╝
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⛳ Scramble</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;600;700&display=swap');

    /* ── RESET ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DESIGN TOKENS ───────────────────────────────────────── */
    :root {
      --bg:           #080a0c;
      --surface:      #111418;
      --surface2:     #1c2028;
      --surface3:     #252a33;
      --border:       #2a2f3a;
      --border2:      #353d4a;
      --text:         #eef0f3;
      --text-dim:     #6b7585;
      --text-mid:     #99a3b3;

      --blue:         #2d7ef7;
      --blue-bright:  #5b9ffa;
      --blue-light:   #a8c8fd;
      --blue-bg:      #0d1c35;
      --blue-glow:    rgba(45,126,247,0.2);

      --red:          #e63946;
      --red-bright:   #f05765;
      --red-light:    #f9a8af;
      --red-bg:       #2a0d10;
      --red-glow:     rgba(230,57,70,0.2);

      --green:        #22c55e;
      --amber:        #f59e0b;
      --amber-dark:   #d97706;

      --tab-h:        68px;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      bottom: var(--tab-h);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .panel { display: none; padding: 12px 10px 24px; }
    .panel.active { display: block; }

    /* ── TAB BAR ─────────────────────────────────────────────── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: #0b0d10;
      border-top: 1px solid var(--border2);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.15s;
      padding-bottom: 4px;
      position: relative;
    }

    .tab-btn .tab-icon {
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--blue);
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .tab-btn.active { color: var(--text); }
    .tab-btn.active .tab-icon { transform: scale(1.1); }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:active { opacity: 0.65; }

    /* ── BANNERS ─────────────────────────────────────────────── */
    #offline-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #7c2d12;
      color: #fed7aa;
      text-align: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 11px 16px;
      z-index: 300;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    #offline-banner.show { transform: translateY(0); }

    #live-badge {
      position: fixed;
      top: 10px; right: 10px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--green);
      background: rgba(8,10,12,0.85);
      border: 1px solid rgba(34,197,94,0.3);
      padding: 4px 9px;
      border-radius: 20px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.3s;
    }

    #live-badge.stale { color: var(--text-dim); border-color: var(--border); }
    #live-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── ROUND SUMMARY ───────────────────────────────────────── */
    .round-summary-section {
      margin-bottom: 10px;
    }

    .round-summary-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 3px;
      padding-left: 2px;
    }

    .round-summary-label-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .round-summary-card {
      display: flex;
      align-items: stretch;
      border-radius: 11px;
      overflow: hidden;
      border: 1px solid;
      margin-bottom: 8px;
    }

    .round-summary-card.b { background: var(--blue-bg); border-color: rgba(45,126,247,0.4); }
    .round-summary-card.r { background: var(--red-bg);  border-color: rgba(230,57,70,0.4); }

    .round-col {
      flex: 1;
      text-align: center;
      padding: 12px 6px;
    }

    .round-col-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .round-col-val {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .round-col-sub {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      margin-top: 3px;
    }

    .round-divider {
      width: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px 0;
    }

    /* ── HOLE INFO STRIP ─────────────────────────────────────── */
    .hole-info-strip {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 11px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .hole-info-cell {
      flex: 1;
      text-align: center;
      padding: 10px 4px;
    }

    .hole-info-val {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      color: var(--amber);
    }

    .hole-info-key {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .hole-info-divider {
      width: 1px;
      height: 36px;
      background: var(--border2);
      flex-shrink: 0;
    }

    /* ── MATCH HEADER ────────────────────────────────────────── */
    .match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 13px 16px;
      margin-bottom: 10px;
    }

    .match-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
    }

    .match-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .hole-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hole-nav-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }

    .hole-nav-btn:active { background: var(--surface3); }

    .hole-label-wrap { text-align: center; min-width: 52px; }

    .hole-label-text {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hole-number {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      color: var(--amber);
    }

    /* ── TEAM SECTION ────────────────────────────────────────── */
    .team-section {
      border-radius: 14px;
      padding: 13px;
      margin-bottom: 10px;
      border: 1.5px solid;
      position: relative;
      overflow: hidden;
    }

    .team-section::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      opacity: 0.06;
      pointer-events: none;
    }

    .team-section.blue {
      background: linear-gradient(145deg, #0c1a30, #0f2040);
      border-color: var(--blue);
    }

    .team-section.blue::before {
      background: radial-gradient(circle at 0% 0%, var(--blue), transparent 60%);
      opacity: 0.15;
    }

    .team-section.red {
      background: linear-gradient(145deg, #1f0c0e, #2a0d10);
      border-color: var(--red);
    }

    .team-section.red::before {
      background: radial-gradient(circle at 100% 0%, var(--red), transparent 60%);
      opacity: 0.15;
    }

    .team-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-section.blue .team-label { color: var(--blue-bright); }
    .team-section.red .team-label { color: var(--red-bright); }

    /* ── PLAYER CARDS ────────────────────────────────────────── */
    .players-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .player-card {
      background: rgba(0,0,0,0.28);
      border-radius: 11px;
      padding: 11px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .player-name {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      line-height: 1;
    }

    .beer-count {
      font-family: var(--font-display);
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 2px;
    }

    .team-section.blue .beer-count { color: var(--blue-light); }
    .team-section.red .beer-count  { color: var(--red-light); }

    .beer-emoji-label {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .beer-btns {
      display: flex;
      gap: 7px;
      justify-content: center;
    }

    .beer-btn {
      flex: 1;
      max-width: 54px;
      height: 54px;
      border-radius: 11px;
      border: none;
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s, filter 0.12s;
      line-height: 1;
    }

    .beer-btn:active { transform: scale(0.88); filter: brightness(1.2); }

    .beer-btn.minus { background: #1e2530; color: #7a8699; border: 1px solid var(--border2); }
    .beer-btn.plus  { background: var(--amber); color: #0a0a0a; }

    /* ── SCORE SECTION ───────────────────────────────────────── */
    .score-row {
      display: block;
    }

    .score-block {
      background: rgba(0,0,0,0.3);
      border-radius: 11px;
      padding: 14px 14px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .score-block-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .score-num {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .score-block.net .score-num { color: var(--green); }
    .score-block.gross .score-num { color: var(--text); }

    .score-formula {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      min-height: 16px;
    }

    .score-adj-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      max-width: 220px;
      margin: 0 auto;
    }

    .score-adj-btn {
      flex: 1;
      max-width: 90px;
      height: 58px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.1s;
      line-height: 1;
    }

    .score-adj-btn:active { background: var(--surface3); transform: scale(0.92); }

    /* ── HOLE RESULT / MATCH STATUS ──────────────────────────── */
    .hole-result {
      text-align: center;
      padding: 12px 16px;
      border-radius: 11px;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hole-result.blue  { background: var(--blue-bg);  color: var(--blue-light);  border: 1px solid rgba(45,126,247,0.4); }
    .hole-result.red   { background: var(--red-bg);   color: var(--red-light);   border: 1px solid rgba(230,57,70,0.4); }
    .hole-result.half  { background: var(--surface2); color: var(--text-mid);    border: 1px solid var(--border2); }
    .hole-result.none  { background: transparent;     color: var(--text-dim);    border: 1px dashed var(--border); }

    .match-status-bar {
      text-align: center;
      padding: 13px 16px;
      border-radius: 11px;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .match-status-bar.blue { background: var(--blue-bg); color: var(--blue-bright); border: 1px solid var(--blue); }
    .match-status-bar.red  { background: var(--red-bg);  color: var(--red-bright);  border: 1px solid var(--red); }
    .match-status-bar.as   { background: var(--surface); color: var(--text-mid);    border: 1px solid var(--border2); }

    /* ── HOLE HISTORY ────────────────────────────────────────── */
    .history-wrap {
      margin-top: 4px;
    }

    .history-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-display);
    }

    .history-table th {
      background: var(--surface);
      padding: 8px 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border2);
    }

    .history-table td {
      padding: 9px 5px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      font-weight: 600;
    }

    .history-table tr.b-won td { background: rgba(45,126,247,0.07); }
    .history-table tr.r-won td { background: rgba(230,57,70,0.07); }
    .history-table tr.cur td   { font-weight: 900; }

    .win-dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      vertical-align: middle;
    }

    .win-dot.b { background: var(--blue-bright); }
    .win-dot.r { background: var(--red-bright); }

    /* ── SCOREBOARD ──────────────────────────────────────────── */
    .sb-headline {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
      padding-top: 4px;
    }

    .team-banner {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .team-banner-side {
      padding: 16px 12px;
      text-align: center;
    }

    .team-banner-side.b { background: var(--blue-bg); }
    .team-banner-side.r { background: var(--red-bg); }

    .team-banner-name {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .team-banner-side.b .team-banner-name { color: var(--blue-light); }
    .team-banner-side.r .team-banner-name { color: var(--red-light); }

    .team-banner-pts {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
    }

    .team-banner-side.b .team-banner-pts { color: var(--blue); }
    .team-banner-side.r .team-banner-pts { color: var(--red); }

    .team-banner-beers {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .team-banner-vs {
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .sb-section-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .match-card-left { flex: 1; min-width: 0; }

    .match-card-num {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .match-card-players {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-card-status {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .match-card-status.b { color: var(--blue-bright); }
    .match-card-status.r { color: var(--red-bright); }
    .match-card-status.as { color: var(--text-mid); }

    /* ── BEER LEADERBOARD ────────────────────────────────────── */
    .beer-lb {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }

    .beer-lb-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 13px;
    }

    .beer-lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }

    .beer-lb-row:last-child { border-bottom: none; }

    .beer-lb-rank {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .beer-lb-rank.gold   { color: #f59e0b; }
    .beer-lb-rank.silver { color: #94a3b8; }
    .beer-lb-rank.bronze { color: #a16207; }
    .beer-lb-rank.other  { color: var(--text-dim); font-size: 14px; }

    .beer-lb-info { flex: 1; min-width: 0; }

    .beer-lb-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .beer-lb-name.b { color: var(--blue-light); }
    .beer-lb-name.r { color: var(--red-light); }

    .beer-lb-bar-track {
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin-top: 5px;
    }

    .beer-lb-bar-fill {
      height: 4px;
      background: var(--amber);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .beer-lb-count {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 900;
      color: var(--amber);
      flex-shrink: 0;
    }

    /* ── TEAM BEER TOTALS ────────────────────────────────────── */
    .team-beers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .team-beer-card {
      border-radius: 11px;
      padding: 14px;
      text-align: center;
    }

    .team-beer-card.b { background: var(--blue-bg); border: 1px solid rgba(45,126,247,0.35); }
    .team-beer-card.r { background: var(--red-bg);  border: 1px solid rgba(230,57,70,0.35); }

    .team-beer-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .team-beer-card.b .team-beer-label { color: var(--blue-light); }
    .team-beer-card.r .team-beer-label { color: var(--red-light); }

    .team-beer-num {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
    }

    .team-beer-card.b .team-beer-num { color: var(--blue); }
    .team-beer-card.r .team-beer-num { color: var(--red); }

    /* ── RESET BUTTON ────────────────────────────────────────── */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 15px;
      background: transparent;
      border: 1.5px solid #7f1d1d;
      color: #f87171;
      border-radius: 11px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-btn:active { background: rgba(127,29,29,0.3); }

    /* ── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes pulseScale {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes flashBlue {
      0%, 100% { background: transparent; }
      40%       { background: rgba(45,126,247,0.25); }
    }

    @keyframes flashRed {
      0%, 100% { background: transparent; }
      40%       { background: rgba(230,57,70,0.25); }
    }

    @keyframes flashGreen {
      0%, 100% { background: transparent; }
      40%       { background: rgba(34,197,94,0.2); }
    }

    .anim-pulse { animation: pulseScale 0.35s ease both; }
    .anim-flash-b { animation: flashBlue 0.5s ease; }
    .anim-flash-r { animation: flashRed 0.5s ease; }
    .anim-flash-g { animation: flashGreen 0.5s ease; }

    /* ── UTILITIES ───────────────────────────────────────────── */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    .hidden { display: none !important; }
    .no-data { color: var(--text-dim); font-size: 14px; text-align: center; padding: 18px; }
    .spacer { height: 8px; }
  </style>
</head>
<body>

<div id="offline-banner">⚠ OFFLINE — Changes will sync when reconnected</div>

<!-- Live sync badge -->

<!-- Main scrollable content -->

<!-- ════════════════════════════════════════════════════════════
     FIREBASE SDK  (compat mode v9 — no npm required)
     Loaded async — app works fully without it via localStorage
════════════════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
// ▼▼▼  PASTE YOUR FIREBASE CONFIG HERE  ▼▼▼
// Get this from: Firebase Console → ⚙ Project Settings → Your Apps
// Leave as-is to run in LOCAL mode (data saved to this device only).
// Fill in real keys to enable live sync across all players' phones.
// ════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCMQE1-vNBwKiOn6ScidlySNgtQScp49wA",
  authDomain: "ryder-cup-scoring.firebaseapp.com",
  databaseURL: "https://ryder-cup-scoring-default-rtdb.firebaseio.com",
  projectId: "ryder-cup-scoring",
  storageBucket: "ryder-cup-scoring.firebasestorage.app",
  messagingSenderId: "1000019279341",
  appId: "1:1000019279341:web:d9f807b464b4782247be4"
};
// ════════════════════════════════════════════════════════════════
// ▲▲▲  END OF FIREBASE CONFIG  ▲▲▲
// ════════════════════════════════════════════════════════════════

// ── MATCH + PLAYER DEFINITIONS ───────────────────────────────────────
const MATCHES = [
  {
    id: 'match0', label: 'Match 1',
    blue: { players: ['Ben',    'Chase']    },
    red:  { players: ['Brian',  'Coner']    }
  },
  {
    id: 'match1', label: 'Match 2',
    blue: { players: ['Nuge',   'John']     },
    red:  { players: ['Zar',    'Jack']     }
  },
  {
    id: 'match2', label: 'Match 3',
    blue: { players: ['Daniel', 'Chandler'] },
    red:  { players: ['Marco',  'UK']       }
  }
];

const ALL_PLAYERS = MATCHES.flatMap(m => [...m.blue.players, ...m.red.players]);
const PLAYER_TEAM = {};
MATCHES.forEach(m => {
  m.blue.players.forEach(p => PLAYER_TEAM[p] = 'b');
  m.red.players.forEach(p  => PLAYER_TEAM[p] = 'r');
});
const TOTAL_HOLES = 18;
const LS_KEY = 'scramble_v1';

// ── FOREST AKERS EAST COURSE — WHITE TEES ────────────────────────────
// Par 72 · 5588 yds · Rating 71.7 · Slope 122
const COURSE = [
  { hole:1,  par:4, yds:319, hcp:13 },
  { hole:2,  par:4, yds:329, hcp:9  },
  { hole:3,  par:5, yds:486, hcp:1  },
  { hole:4,  par:3, yds:129, hcp:17 },
  { hole:5,  par:4, yds:332, hcp:3  },
  { hole:6,  par:5, yds:424, hcp:5  },
  { hole:7,  par:4, yds:317, hcp:7  },
  { hole:8,  par:3, yds:154, hcp:15 },
  { hole:9,  par:4, yds:347, hcp:11 },
  { hole:10, par:4, yds:258, hcp:18 },
  { hole:11, par:3, yds:174, hcp:16 },
  { hole:12, par:5, yds:459, hcp:10 },
  { hole:13, par:3, yds:184, hcp:14 },
  { hole:14, par:4, yds:329, hcp:4  },
  { hole:15, par:5, yds:433, hcp:2  },
  { hole:16, par:5, yds:424, hcp:8  },
  { hole:17, par:4, yds:338, hcp:6  },
  { hole:18, par:3, yds:152, hcp:12 },
];
const holePar = h => COURSE[h-1].par;
const holeYds = h => COURSE[h-1].yds;

function scoreName(net, par) {
  if (net === null || par === null) return '';
  const d = net - par;
  if (d <= -2) return 'EAGLE 🦅';
  if (d === -1) return 'BIRDIE 🐦';
  if (d ===  0) return 'PAR ✓';
  if (d ===  1) return 'BOGEY';
  if (d ===  2) return 'DBL BOGEY';
  return '+' + d;
}

function scoreColor(net, par) {
  if (net === null || par === null) return 'var(--text-dim)';
  const d = net - par;
  if (d <= -1) return 'var(--green)';
  if (d ===  0) return 'var(--text)';
  if (d ===  1) return '#fb923c';
  return '#f87171';
}

function diffLabel(diff) {
  if (diff === null) return '—';
  if (diff === 0) return 'E';
  return diff > 0 ? '+' + diff : '' + diff;
}

function runningTotals(matchId, side, throughHole) {
  const match = MATCHES.find(m => m.id === matchId);
  const players = match[side].players;
  let netTotal = 0, parTotal = 0, played = 0;
  for (let h = 1; h <= throughHole; h++) {
    const g = getGross(matchId, h, side);
    if (g === null) continue;
    const n = getNet(g, getDuoBeers(players));
    netTotal += n;
    parTotal += holePar(h);
    played++;
  }
  if (played === 0) return null;
  return { net: netTotal, par: parTotal, diff: netTotal - parTotal, played };
}


// ── DETERMINE MODE ────────────────────────────────────────────────────
// Firebase is active only when real keys are present (not placeholders).
const FIREBASE_CONFIGURED =
  firebaseConfig.databaseURL &&
  !firebaseConfig.databaseURL.includes('YOUR_') &&
  firebaseConfig.apiKey &&
  !firebaseConfig.apiKey.includes('YOUR_');

// ── APP STATE (source of truth for rendering) ─────────────────────────
let state = {
  beers:       {},   // { playerName: Number }
  holes:       {},   // { matchId: { hN: { blueGross, redGross } } }
  currentHole: {},   // { matchId: Number }
  lastUpdated: null
};

// Shadow for animation diff detection
let shadow = {};

// ── LOCAL STORAGE HELPERS ─────────────────────────────────────────────
function lsSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function lsLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.beers       = parsed.beers       || {};
      state.holes       = parsed.holes       || {};
      state.currentHole = parsed.currentHole || {};
      state.lastUpdated = parsed.lastUpdated || null;
    }
  } catch(e) {}
}

// ── LOCAL WRITE — updates state + localStorage, then re-renders ───────
function localSet(path, value) {
  // path is an array of keys, e.g. ['beers','Ben'] or ['holes','match0','h3','blueGross']
  let obj = state;
  for (let i = 0; i < path.length - 1; i++) {
    if (obj[path[i]] == null || typeof obj[path[i]] !== 'object') obj[path[i]] = {};
    obj = obj[path[i]];
  }
  obj[path[path.length - 1]] = value;
  state.lastUpdated = Date.now();
  lsSave();
  renderAll();
  tickBadge();
}

function localTransaction(path, fn) {
  let obj = state;
  for (let i = 0; i < path.length - 1; i++) {
    if (obj[path[i]] == null || typeof obj[path[i]] !== 'object') obj[path[i]] = {};
    obj = obj[path[i]];
  }
  const key = path[path.length - 1];
  obj[key] = fn(obj[key] ?? null);
  state.lastUpdated = Date.now();
  lsSave();
  renderAll();
  tickBadge();
}

// ── FIREBASE INIT (only when configured) ─────────────────────────────
let db = null;

if (FIREBASE_CONFIGURED) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();

    // Pull all state from Firebase in real time
    db.ref('/').on('value', snap => {
      const raw = snap.val() || {};

      // Diff for animations
      const pendingAnims = [];
      ALL_PLAYERS.forEach(p => {
        const key = `beer_${p}`;
        const nv = (raw.beers || {})[p] || 0;
        if (shadow[key] !== undefined && shadow[key] !== nv)
          pendingAnims.push({ key, type: PLAYER_TEAM[p] });
        shadow[key] = nv;
      });
      MATCHES.forEach(m => {
        for (let h = 1; h <= TOTAL_HOLES; h++) {
          ['blueGross','redGross'].forEach(k => {
            const key = `${m.id}_h${h}_${k}`;
            const nv = ((raw.holes || {})[m.id] || {})[`h${h}`]?.[k];
            if (shadow[key] !== undefined && shadow[key] !== nv)
              pendingAnims.push({ key: `score_${m.id}_${k.startsWith('b')?'b':'r'}`, type: k.startsWith('b')?'b':'r' });
            shadow[key] = nv;
          });
        }
      });

      state.beers       = raw.beers       || {};
      state.holes       = raw.holes       || {};
      state.currentHole = raw.currentHole || {};
      state.lastUpdated = raw.lastUpdated || null;

      renderAll();
      tickBadge();

      requestAnimationFrame(() => {
        pendingAnims.forEach(({ key, type }) => {
          document.querySelectorAll(`[data-anim="${key}"]`).forEach(el => {
            el.classList.remove('anim-pulse','anim-flash-b','anim-flash-r');
            void el.offsetWidth;
            el.classList.add('anim-pulse', type === 'b' ? 'anim-flash-b' : 'anim-flash-r');
            setTimeout(() => el.classList.remove('anim-pulse','anim-flash-b','anim-flash-r'), 600);
          });
        });
      });
    });

    db.ref('.info/connected').on(snap => {
      document.getElementById('offline-banner').classList.toggle('show', snap.val() !== true);
    });

  } catch(err) {
    console.error('Firebase init failed:', err);
    db = null;
  }
} else {
  // LOCAL MODE — load from localStorage, update badge
  lsLoad();
  const badge = document.getElementById('live-badge');
  badge.textContent = '💾 LOCAL';
  badge.style.color = 'var(--amber)';
  badge.style.borderColor = 'rgba(245,158,11,0.4)';
}

// ── UNIFIED WRITE FUNCTIONS ───────────────────────────────────────────
// These work in both local mode and Firebase mode.

function touch() {
  if (db) db.ref('/lastUpdated').set(Date.now());
}

function beerAdd(player) {
  if (db) {
    db.ref(`/beers/${player}`).transaction(v => Math.max(0, (v || 0) + 1));
    touch();
  } else {
    localTransaction(['beers', player], v => Math.max(0, (v || 0) + 1));
  }
}

function beerRemove(player) {
  if (db) {
    db.ref(`/beers/${player}`).transaction(v => Math.max(0, (v || 0) - 1));
    touch();
  } else {
    localTransaction(['beers', player], v => Math.max(0, (v || 0) - 1));
  }
}

function adjustGross(matchId, hole, side, delta) {
  const curr = getGross(matchId, hole, side);
  const next = Math.max(1, Math.min(20, (curr ?? 4) + delta));
  if (db) {
    db.ref(`/holes/${matchId}/h${hole}/${side}Gross`).set(next);
    touch();
  } else {
    localSet(['holes', matchId, `h${hole}`, `${side}Gross`], next);
  }
}

function changeHole(matchId, delta) {
  const curr = getCurrHole(matchId);
  const next = Math.max(1, Math.min(TOTAL_HOLES, curr + delta));
  if (db) {
    db.ref(`/currentHole/${matchId}`).set(next);
    touch();
  } else {
    localSet(['currentHole', matchId], next);
  }
}

function resetRound() {
  if (!confirm('⚠ RESET ROUND?\n\nThis wipes ALL scores and beers. Cannot be undone.')) return;
  if (!confirm('Final confirmation — are you sure?')) return;
  const blank = { beers: {}, holes: {}, currentHole: { match0:1, match1:1, match2:1 }, lastUpdated: Date.now() };
  if (db) {
    db.ref('/').set(blank);
  } else {
    state = blank;
    lsSave();
    renderAll();
    tickBadge();
  }
}

// ── CALCULATION HELPERS ───────────────────────────────────────────────
const getBeers    = p       => state.beers[p] || 0;
const getDuoBeers = players => players.reduce((s, p) => s + getBeers(p), 0);
const getCurrHole = matchId => state.currentHole[matchId] || 1;
const getGross    = (mid, h, side) =>
  ((state.holes[mid] || {})[`h${h}`] || {})[`${side}Gross`] ?? null;

// Hole-by-hole winner uses GROSS only — beers don't affect match play
function holeWinner(matchId, hole) {
  const bg = getGross(matchId, hole, 'blue');
  const rg = getGross(matchId, hole, 'red');
  if (bg === null || rg === null) return null;
  if (bg < rg) return 'b';
  if (rg < bg) return 'r';
  return 'half';
}

function matchStatus(matchId) {
  let bW = 0, rW = 0;
  for (let h = 1; h <= TOTAL_HOLES; h++) {
    const w = holeWinner(matchId, h);
    if (w === 'b') bW++;
    else if (w === 'r') rW++;
  }
  const d = bW - rW;
  if (d === 0) return { label: 'ALL SQUARE', cls: 'as' };
  if (d > 0)   return { label: 'BLUE ' + d + 'UP',           cls: 'blue' };
  return           { label: 'RED '  + Math.abs(d) + 'UP',   cls: 'red'  };
}

// Round gross totals (all holes with scores entered)
function roundGrossTotal(matchId, side) {
  let total = 0, played = 0, parTotal = 0;
  for (let h = 1; h <= TOTAL_HOLES; h++) {
    const g = getGross(matchId, h, side);
    if (g === null) continue;
    total    += g;
    parTotal += holePar(h);
    played++;
  }
  return played === 0 ? null : { gross: total, par: parTotal, diff: total - parTotal, played };
}

// Beer-adjusted round net = gross total - duo's total beers
function roundBeerNet(matchId, side) {
  const tot = roundGrossTotal(matchId, side);
  if (!tot) return null;
  const match = MATCHES.find(m => m.id === matchId);
  const beers = getDuoBeers(match[side].players);
  const net   = Math.max(1, tot.gross - beers);
  return { gross: tot.gross, beers, net, par: tot.par, diff: net - tot.par };
}

// ── RENDER: MATCH PANEL ───────────────────────────────────────────────
function renderMatch(idx) {
  const match   = MATCHES[idx];
  const mid     = match.id;
  const curHole = getCurrHole(mid);
  const panel   = document.getElementById('panel-' + mid);
  const par     = holePar(curHole);
  const yds     = holeYds(curHole);
  const hcp     = COURSE[curHole - 1].hcp;

  const bBeers  = getDuoBeers(match.blue.players);
  const rBeers  = getDuoBeers(match.red.players);
  const bGross  = getGross(mid, curHole, 'blue');
  const rGross  = getGross(mid, curHole, 'red');

  const winner  = holeWinner(mid, curHole);
  const status  = matchStatus(mid);

  const bRound  = roundGrossTotal(mid, 'blue');
  const rRound  = roundGrossTotal(mid, 'red');
  const bNet    = roundBeerNet(mid, 'blue');
  const rNet    = roundBeerNet(mid, 'red');

  // Hole result display
  let holeResClass, holeResText;
  if (winner === 'b')      { holeResClass = 'blue'; holeResText = '\u{1F535} BLUE WINS HOLE ' + curHole; }
  else if (winner === 'r') { holeResClass = 'red';  holeResText = '\u{1F534} RED WINS HOLE '  + curHole; }
  else if (winner === 'half') { holeResClass = 'half'; holeResText = '\u{1F91D} HOLE ' + curHole + ' HALVED'; }
  else { holeResClass = 'none'; holeResText = '\u2014 Enter scores above \u2014'; }

  // Player beer card (counters only)
  const playerCard = (player) => {
    const cnt = getBeers(player);
    return '<div class="player-card" data-anim="beer_' + player + '">'
      + '<div class="player-name">' + player + '</div>'
      + '<div class="beer-count" style="' + (cnt >= 10 ? 'font-size:34px' : '') + '">' + cnt + '</div>'
      + '<div class="beer-emoji-label">\u{1F37A} beers</div>'
      + '<div class="beer-btns">'
      + '<button class="beer-btn minus" onclick="beerRemove(\'' + player + '\')">\u2212</button>'
      + '<button class="beer-btn plus"  onclick="beerAdd(\'' + player + '\')">+</button>'
      + '</div></div>';
  };

  // Score card: gross + par chip
  const scoreCard = (gross, p, animKey, side) => {
    const vpar = gross !== null ? gross - p : null;
    const chip = gross !== null ? scoreName(gross, p) : '';
    const col  = gross !== null ? scoreColor(gross, p) : 'var(--text-dim)';
    return '<div class="score-block gross">'
      + '<div class="score-block-label">Hole Score</div>'
      + '<div class="score-num" data-anim="' + animKey + '">' + (gross !== null ? gross : '\u2014') + '</div>'
      + '<div class="score-formula" style="color:var(--text-dim)">par ' + p + ' \u00b7 ' + yds + ' yds</div>'
      + (gross !== null ? '<div style="font-size:14px;font-weight:800;color:' + col + ';letter-spacing:1px;margin-top:4px">' + chip + '</div>' : '<div style="font-size:12px;color:var(--text-dim);margin-top:8px">tap + to enter</div>')
      + '<div class="score-adj-row" style="margin-top:8px">'
      + '<button class="score-adj-btn" onclick="adjustGross(\'' + mid + '\',' + curHole + ',\'' + side + '\',-1)">\u2212</button>'
      + '<button class="score-adj-btn" onclick="adjustGross(\'' + mid + '\',' + curHole + ',\'' + side + '\',1)">+</button>'
      + '</div></div>';
  };

  // Round summary card: gross total, beer net, vs-par
  const roundCard = (round, net, beers, teamCls) => {
    if (!round) return '<div class="round-summary-card ' + teamCls + '">'
      + '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:10px">No holes played</div>'
      + '</div>';
    const gDiff    = round.diff;
    const gDiffCol = gDiff < 0 ? 'var(--green)' : gDiff === 0 ? 'var(--text)' : '#fb923c';
    const nDiff    = net ? net.diff : null;
    const nDiffCol = nDiff === null ? 'var(--text-dim)' : nDiff < 0 ? 'var(--green)' : nDiff === 0 ? 'var(--text)' : '#fb923c';
    return '<div class="round-summary-card ' + teamCls + '">'
      + '<div class="round-col">'
      + '<div class="round-col-label">Gross</div>'
      + '<div class="round-col-val">' + round.gross + '</div>'
      + '<div class="round-col-sub" style="color:' + gDiffCol + '">' + diffLabel(gDiff) + '</div>'
      + '</div>'
      + '<div class="round-divider"></div>'
      + '<div class="round-col">'
      + '<div class="round-col-label">Beers</div>'
      + '<div class="round-col-val" style="color:var(--amber)">' + beers + ' \u{1F37A}</div>'
      + '<div class="round-col-sub" style="color:var(--text-dim)">-' + beers + ' strokes</div>'
      + '</div>'
      + '<div class="round-divider"></div>'
      + '<div class="round-col">'
      + '<div class="round-col-label">Net Total</div>'
      + '<div class="round-col-val" style="color:var(--green)">' + (net ? net.net : '\u2014') + '</div>'
      + '<div class="round-col-sub" style="color:' + nDiffCol + '">' + (nDiff !== null ? diffLabel(nDiff) : '\u2014') + '</div>'
      + '</div>'
      + '</div>';
  };

  // History table
  let histHTML = '';
  let hasHistory = false;
  let bRunGross = 0, rRunGross = 0, bRunPar = 0, rRunPar = 0;
  for (let h = 1; h <= TOTAL_HOLES; h++) {
    const bg = getGross(mid, h, 'blue');
    const rg = getGross(mid, h, 'red');
    const hp = holePar(h);
    if (bg === null && rg === null) continue;
    hasHistory = true;
    if (bg !== null) { bRunGross += bg; bRunPar += hp; }
    if (rg !== null) { rRunGross += rg; rRunPar += hp; }
    const bDiff = bg !== null ? bg - hp : null;
    const rDiff = rg !== null ? rg - hp : null;
    const w = holeWinner(mid, h);
    const rowCls = (w === 'b' ? 'b-won' : w === 'r' ? 'r-won' : '') + (h === curHole ? ' cur' : '');
    const bDiffCol = bDiff === null ? 'var(--text-dim)' : bDiff < 0 ? 'var(--green)' : bDiff === 0 ? 'var(--text)' : '#fb923c';
    const rDiffCol = rDiff === null ? 'var(--text-dim)' : rDiff < 0 ? 'var(--green)' : rDiff === 0 ? 'var(--text)' : '#fb923c';
    let winCell = '&mdash;';
    if (w === 'b')    winCell = '<span class="win-dot b"></span>';
    else if (w === 'r')    winCell = '<span class="win-dot r"></span>';
    else if (w === 'half') winCell = '&frac12;';
    histHTML += '<tr class="' + rowCls + '">'
      + '<td><strong>' + h + '</strong></td>'
      + '<td style="color:var(--text-dim);font-size:11px">' + hp + '</td>'
      + '<td style="color:var(--blue-light)">' + (bg !== null ? bg : '&mdash;') + '</td>'
      + '<td style="color:' + bDiffCol + ';font-weight:800">' + (bDiff !== null ? (bDiff > 0 ? '+' : '') + bDiff : '&mdash;') + '</td>'
      + '<td style="color:var(--red-light)">' + (rg !== null ? rg : '&mdash;') + '</td>'
      + '<td style="color:' + rDiffCol + ';font-weight:800">' + (rDiff !== null ? (rDiff > 0 ? '+' : '') + rDiff : '&mdash;') + '</td>'
      + '<td>' + winCell + '</td>'
      + '</tr>';
  }
  const bTotDiff = bRunPar > 0 ? bRunGross - bRunPar : null;
  const rTotDiff = rRunPar > 0 ? rRunGross - rRunPar : null;
  const bTotCol  = bTotDiff === null ? 'var(--text-dim)' : bTotDiff < 0 ? 'var(--green)' : bTotDiff === 0 ? 'var(--text)' : '#fb923c';
  const rTotCol  = rTotDiff === null ? 'var(--text-dim)' : rTotDiff < 0 ? 'var(--green)' : rTotDiff === 0 ? 'var(--text)' : '#fb923c';

  const histSection = hasHistory
    ? '<table class="history-table"><thead><tr>'
        + '<th>#</th><th>Par</th>'
        + '<th style="color:var(--blue-light)">Blue</th><th style="color:var(--blue-light)">\u00b1</th>'
        + '<th style="color:var(--red-light)">Red</th><th style="color:var(--red-light)">\u00b1</th>'
        + '<th>Win</th></tr></thead><tbody>'
        + histHTML
        + '<tr style="border-top:2px solid var(--border2);font-weight:900">'
        + '<td colspan="2" style="color:var(--text-dim);font-size:10px;text-align:left;padding-left:4px">GROSS TOT</td>'
        + '<td style="color:var(--blue-light)">' + (bRunGross || '&mdash;') + '</td>'
        + '<td style="color:' + bTotCol + '">' + (bTotDiff !== null ? diffLabel(bTotDiff) : '&mdash;') + '</td>'
        + '<td style="color:var(--red-light)">' + (rRunGross || '&mdash;') + '</td>'
        + '<td style="color:' + rTotCol + '">' + (rTotDiff !== null ? diffLabel(rTotDiff) : '&mdash;') + '</td>'
        + '<td></td></tr>'
        + '</tbody></table>'
    : '<div class="no-data">No scores entered yet</div>';

  panel.innerHTML =
    // Header
    '<div class="match-header">'
    + '<div><div class="match-title">' + match.label + '</div><div class="match-subtitle">Match Play \u00b7 Beer Scramble</div></div>'
    + '<div class="hole-nav">'
    + '<button class="hole-nav-btn" onclick="changeHole(\'' + mid + '\',-1)">\u2039</button>'
    + '<div class="hole-label-wrap"><div class="hole-label-text">HOLE</div><div class="hole-number">' + curHole + '</div></div>'
    + '<button class="hole-nav-btn" onclick="changeHole(\'' + mid + '\',1)">\u203a</button>'
    + '</div></div>'

    // Hole info strip
    + '<div class="hole-info-strip">'
    + '<div class="hole-info-cell"><div class="hole-info-val">' + par + '</div><div class="hole-info-key">PAR</div></div>'
    + '<div class="hole-info-divider"></div>'
    + '<div class="hole-info-cell"><div class="hole-info-val">' + yds + '</div><div class="hole-info-key">YARDS</div></div>'
    + '<div class="hole-info-divider"></div>'
    + '<div class="hole-info-cell"><div class="hole-info-val">' + hcp + '</div><div class="hole-info-key">HCP</div></div>'
    + '<div class="hole-info-divider"></div>'
    + '<div class="hole-info-cell"><div class="hole-info-val">' + (curHole <= 9 ? 'FRONT' : 'BACK') + '</div><div class="hole-info-key">9</div></div>'
    + '</div>'

    // ── BLUE SECTION ──────────────────────────────────────────────────────
    + '<div class="team-section blue">'
    + '<div class="team-label">\u{1F535} Blue \u00a0 ' + match.blue.players.join(' &amp; ') + '</div>'

    // Beer counters
    + '<div class="players-row">' + match.blue.players.map(playerCard).join('') + '</div>'

    // Hole score input
    + '<div class="score-row">'
    + scoreCard(bGross, par, 'score_' + mid + '_b', 'blue')
    + '</div>'
    + '</div>'

    // ── RED SECTION ──────────────────────────────────────────────────────
    + '<div class="team-section red">'
    + '<div class="team-label">\u{1F534} Red \u00a0 ' + match.red.players.join(' &amp; ') + '</div>'
    + '<div class="players-row">' + match.red.players.map(playerCard).join('') + '</div>'
    + '<div class="score-row">'
    + scoreCard(rGross, par, 'score_' + mid + '_r', 'red')
    + '</div>'
    + '</div>'

    // Hole result + match status
    + '<div class="hole-result ' + holeResClass + '">' + holeResText + '</div>'
    + '<div class="match-status-bar ' + status.cls + '">' + status.label + '</div>'

    // ── ROUND SUMMARY ────────────────────────────────────────────────────
    + '<div class="round-summary-section">'
    + '<div class="round-summary-label">\u{1F4CA} Round Summary</div>'
    + '<div class="round-summary-label-sub">Gross vs par (match play) \u00b7 Beer net = gross \u2212 total beers</div>'
    + roundCard(bRound, bNet, bBeers, 'b')
    + roundCard(rRound, rNet, rBeers, 'r')
    + '</div>'

    // ── HISTORY ──────────────────────────────────────────────────────────
    + '<div class="history-wrap"><div class="history-label">\u{1F4CB} Hole History (gross \u00b1 par)</div>'
    + histSection + '</div>';
}

// ── RENDER: SCOREBOARD ────────────────────────────────────────────────
function renderScoreboard() {
  const panel = document.getElementById('panel-scoreboard');

  // Team match points
  let bPts = 0, rPts = 0;
  MATCHES.forEach(m => {
    const s = matchStatus(m.id);
    if (s.cls === 'blue') bPts++;
    else if (s.cls === 'red') rPts++;
  });

  // Match summary cards
  const matchCards = MATCHES.map(m => {
    const s = matchStatus(m.id);
    const cls = s.cls === 'blue' ? 'b' : s.cls === 'red' ? 'r' : 'as';
    return `
      <div class="match-card">
        <div class="match-card-left">
          <div class="match-card-num">${m.label}</div>
          <div class="match-card-players">
            <span style="color:var(--blue-light)">${m.blue.players.join(' & ')}</span>
            <span style="color:var(--text-dim)"> vs </span>
            <span style="color:var(--red-light)">${m.red.players.join(' & ')}</span>
          </div>
        </div>
        <div class="match-card-status ${cls}">${s.label}</div>
      </div>`;
  }).join('');

  // Beer leaderboard
  const sorted = ALL_PLAYERS
    .map(p => ({ name: p, team: PLAYER_TEAM[p], count: getBeers(p) }))
    .sort((a, b) => b.count - a.count);

  const maxBeer = sorted[0]?.count || 1;
  const rankEmojis = ['🥇','🥈','🥉'];

  const lbRows = sorted.map((p, i) => {
    const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    const rankLabel = i < 3 ? rankEmojis[i] : `${i+1}`;
    const pct = maxBeer > 0 ? Math.round(p.count / maxBeer * 100) : 0;
    return `
      <div class="beer-lb-row">
        <div class="beer-lb-rank ${rankCls}">${rankLabel}</div>
        <div class="beer-lb-info">
          <div class="beer-lb-name ${p.team}">${p.name}</div>
          <div class="beer-lb-bar-track" style="width:100%">
            <div class="beer-lb-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="beer-lb-count" data-anim="beer_${p.name}">${p.count}🍺</div>
      </div>`;
  }).join('');

  // Team beer totals
  const bTotalBeers = MATCHES.flatMap(m => m.blue.players).reduce((s,p) => s+getBeers(p), 0);
  const rTotalBeers = MATCHES.flatMap(m => m.red.players).reduce((s,p)  => s+getBeers(p), 0);

  panel.innerHTML = `
    <div class="sb-headline">⛳ Live Scoreboard</div>

    <div class="team-banner">
      <div class="team-banner-side b">
        <div class="team-banner-name">Team Blue</div>
        <div class="team-banner-pts">${bPts}</div>
        <div class="team-banner-beers">${bTotalBeers} 🍺 total</div>
      </div>
      <div class="team-banner-vs">VS</div>
      <div class="team-banner-side r">
        <div class="team-banner-name">Team Red</div>
        <div class="team-banner-pts">${rPts}</div>
        <div class="team-banner-beers">${rTotalBeers} 🍺 total</div>
      </div>
    </div>

    <div class="sb-section-label">Match Status</div>
    ${matchCards}

    <div class="beer-lb">
      <div class="beer-lb-title">🍺 Beer Leaderboard</div>
      ${lbRows}
    </div>

    <div class="team-beers-grid">
      <div class="team-beer-card b">
        <div class="team-beer-label">Blue Total</div>
        <div class="team-beer-num">${bTotalBeers}</div>
        <div style="font-size:22px;margin-top:4px">🍺</div>
      </div>
      <div class="team-beer-card r">
        <div class="team-beer-label">Red Total</div>
        <div class="team-beer-num">${rTotalBeers}</div>
        <div style="font-size:22px;margin-top:4px">🍺</div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetRound()">⚠ RESET ROUND — Clear All Scores & Beers</button>
    <div style="height:4px"></div>
  `;
}

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  MATCHES.forEach((_, i) => renderMatch(i));
  renderScoreboard();
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${id}`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');
  document.getElementById('app').scrollTop = 0;
}

// ── LIVE BADGE ────────────────────────────────────────────────────────
function tickBadge() {
  const el = document.getElementById('live-badge');
  if (!FIREBASE_CONFIGURED) return; // badge already set to LOCAL in init
  if (!state.lastUpdated) { el.textContent = 'SYNCING'; return; }
  const secs = Math.round((Date.now() - state.lastUpdated) / 1000);
  if (secs < 8) {
    el.textContent = '● LIVE';
    el.style.color = '';
    el.classList.remove('stale');
  } else {
    el.textContent = `Updated ${secs}s ago`;
    el.classList.add('stale');
  }
}

setInterval(tickBadge, 5000);

// ── INITIAL RENDER ────────────────────────────────────────────────────
renderAll();
tickBadge();
</script>
</body>
</html>
